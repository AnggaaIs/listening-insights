name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Release metadata check
        run: pnpm release:check

      - name: Build production dist
        run: pnpm build-local

      - name: Publish marketplace dist branch
        run: |
          mkdir publish
          cp -r dist publish/dist
          cp manifest.json README.md CHANGELOG.md preview.png preview2.png publish/
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b dist
          git add .
          git commit -m "chore: publish marketplace dist ${GITHUB_REF_NAME}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin dist

      - name: Package release artifact
        run: |
          mkdir -p release
          cp -r dist release/dist
          cp manifest.json README.md CHANGELOG.md preview.png preview2.png release/
          tar -czf listening-insights-${GITHUB_REF_NAME}.tar.gz -C release .
          zip -r listening-insights-${GITHUB_REF_NAME}.zip release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            listening-insights-${{ github.ref_name }}.tar.gz
            listening-insights-${{ github.ref_name }}.zip
